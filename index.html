<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="description" content="">
	<meta name="author" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Potree Viewer - Robot Walkthrough</title>

	<link rel="stylesheet" type="text/css" href="./libs/potree/potree.css">
	<link rel="stylesheet" type="text/css" href="./libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" type="text/css" href="./libs/openlayers3/ol.css">
	<link rel="stylesheet" type="text/css" href="./libs/spectrum/spectrum.css">
	<link rel="stylesheet" type="text/css" href="./libs/jstree/themes/mixed/style.css">

	<style>
		#robot-hud {
			position: absolute;
			top: 20px;
			left: 20px;
			color: #00ffcc;
			font-family: 'Courier New', monospace;
			font-size: 14px;
			background: rgba(0, 20, 20, 0.75);
			border: 1px solid #00ffcc;
			padding: 15px;
			border-radius: 8px;
			pointer-events: none;
			z-index: 1000;
			box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
		}
		#robot-crosshair {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 20px;
			height: 20px;
			border: 2px solid rgba(0, 255, 204, 0.6);
			border-radius: 50%;
			pointer-events: none;
			z-index: 1000;
		}
		#robot-crosshair::after {
			content: '';
			position: absolute;
			top: 6px;
			left: 6px;
			width: 4px;
			height: 4px;
			background: #00ffcc;
			border-radius: 50%;
		}
	</style>
</head>

<body>
	<script src="./libs/jquery/jquery-3.1.1.min.js"></script>
	<script src="./libs/spectrum/spectrum.js"></script>
	<script src="./libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="./libs/other/BinaryHeap.js"></script>
	<script src="./libs/tween/tween.min.js"></script>
	<script src="./libs/d3/d3.js"></script>
	<script src="./libs/proj4/proj4.js"></script>
	<script src="./libs/openlayers3/ol.js"></script>
	<script src="./libs/i18next/i18next.js"></script>
	<script src="./libs/jstree/jstree.js"></script>
	<script src="./libs/potree/potree.js"></script>
	<script src="./libs/plasio/js/laslaz.js"></script>
	
	<div id="robot-hud">
		<div><strong>UNIT:</strong> GEO-BOT v2.4</div>
		<div><strong>STATUS:</strong> <span style="color:#00ffcc">PATROL ACTIVE</span></div>
		<div><strong>NAV MODE:</strong> FIRST-PERSON</div>
		<div><strong>CONTROLS:</strong> [W,A,S,D] Move | [Click + Drag] Look</div>
	</div>
	<div id="robot-crosshair"></div>
	
	<div class="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; ">
		<div id="potree_render_area" style="background-image: url('../build/potree/resources/images/background.jpg');"></div>
		<div id="potree_sidebar_container"> </div>
	</div>
	
	<script>
		window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
		
		viewer.setEDLEnabled(true);
		viewer.setFOV(60);
		viewer.setPointBudget(2_000_000);
		viewer.loadSettingsFromURL();
		
		viewer.setDescription("Autonomous Robot Walkthrough Mode Active.");
		
		viewer.loadGUI(() => {
			viewer.setLanguage('en');
			$("#menu_appearance").next().show();
			$("#menu_tools").next().show();
			$("#menu_clipping").next().show();
			viewer.toggleSidebar();
		});

		Potree.loadPointCloud("./pointclouds/index/metadata.json", "index", e => {
			let scene = viewer.scene;
			let pointcloud = e.pointcloud;
			
			let material = pointcloud.material;
			material.size = 1;
			material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
			material.shape = Potree.PointShape.SQUARE;
			material.activeAttributeName = "rgba";
			
			scene.addPointCloud(pointcloud);
			
			// 1. Zoom to fit the entire point cloud perfectly (Guarantees we don't spawn in the void)
			viewer.fitToScreen();
			
			// 2. Activate First-Person mode from this safe bird's-eye view
			viewer.setControls(viewer.fpControls);

			// Automatically calculate a good flying speed based on the size of the point cloud
			let radius = pointcloud.boundingSphere.radius;
			viewer.getControls().speed = radius * 0.05; 

			// === CREATE A VISIBLE HOLOGRAPHIC ROBOT DRONE ===
			let robotGroup = new THREE.Group();
			
			// 1. Build a Sci-Fi Saucer Body
			let bodyGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.2, 16); 
			bodyGeo.rotateX(Math.PI / 2);
			// depthTest: false forces it to render ON TOP of the points so it never gets buried!
			let bodyMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, depthTest: false, transparent: true });
			let body = new THREE.Mesh(bodyGeo, bodyMat);
			robotGroup.add(body);
			
			// 2. Build the glowing eye
			let eyeGeo = new THREE.BoxGeometry(0.6, 0.15, 0.2);
			let eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false });
			let eye = new THREE.Mesh(eyeGeo, eyeMat);
			eye.position.set(0, 0, -0.4); 
			robotGroup.add(eye);
			
			robotGroup.renderOrder = 999; // Ensure it draws last (on top)
			viewer.scene.scene.add(robotGroup);
			
			viewer.addEventListener("update", () => {
				let camera = viewer.scene.getActiveCamera();
				if (!camera) return; 
				
				// 3. Guarantee it stays visible by pinning it just past the camera's near clipping plane
				let safeDistance = camera.near + 0.5; 
				let safeScale = safeDistance * 0.2; 
				
				robotGroup.scale.set(safeScale, safeScale, safeScale);
				
				// Place it slightly down and right in front of the lens
				let offset = new THREE.Vector3(0, -0.3 * safeDistance, -safeDistance);
				offset.applyMatrix4(camera.matrixWorld);
				
				robotGroup.position.copy(offset);
				robotGroup.quaternion.copy(camera.quaternion);
				
				// 4. Gentle hover animation
				let time = performance.now() * 0.003;
				robotGroup.translateY(Math.sin(time) * (safeScale * 0.1));
			});
			// === END ROBOT DRONE CODE ===
		});
	</script>
</body>
</html>
