<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="description" content="">
	<meta name="author" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Potree Viewer - Robot Walkthrough</title>

	<link rel="stylesheet" type="text/css" href="./libs/potree/potree.css">
	<link rel="stylesheet" type="text/css" href="./libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" type="text/css" href="./libs/openlayers3/ol.css">
	<link rel="stylesheet" type="text/css" href="./libs/spectrum/spectrum.css">
	<link rel="stylesheet" type="text/css" href="./libs/jstree/themes/mixed/style.css">

	<style>
		#robot-hud {
			position: absolute;
			top: 20px;
			left: 20px;
			color: #00ffcc;
			font-family: 'Courier New', monospace;
			font-size: 14px;
			background: rgba(0, 20, 20, 0.75);
			border: 1px solid #00ffcc;
			padding: 15px;
			border-radius: 8px;
			pointer-events: none;
			z-index: 1000;
			box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
		}
		#robot-crosshair {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 20px;
			height: 20px;
			border: 2px solid rgba(0, 255, 204, 0.6);
			border-radius: 50%;
			pointer-events: none;
			z-index: 1000;
		}
		#robot-crosshair::after {
			content: '';
			position: absolute;
			top: 6px;
			left: 6px;
			width: 4px;
			height: 4px;
			background: #00ffcc;
			border-radius: 50%;
		}
	</style>
</head>

<body>
	<script src="./libs/jquery/jquery-3.1.1.min.js"></script>
	<script src="./libs/spectrum/spectrum.js"></script>
	<script src="./libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="./libs/other/BinaryHeap.js"></script>
	<script src="./libs/tween/tween.min.js"></script>
	<script src="./libs/d3/d3.js"></script>
	<script src="./libs/proj4/proj4.js"></script>
	<script src="./libs/openlayers3/ol.js"></script>
	<script src="./libs/i18next/i18next.js"></script>
	<script src="./libs/jstree/jstree.js"></script>
	<script src="./libs/potree/potree.js"></script>
	<script src="./libs/plasio/js/laslaz.js"></script>
	
	<div id="robot-hud">
		<div><strong>UNIT:</strong> GEO-BOT v2.4</div>
		<div><strong>STATUS:</strong> <span style="color:#00ffcc">PATROL ACTIVE</span></div>
		<div><strong>NAV MODE:</strong> FIRST-PERSON</div>
		<div><strong>CONTROLS:</strong> [W,A,S,D] Move | [Click + Drag] Look</div>
	</div>
	<div id="robot-crosshair"></div>
	
	<div class="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; ">
		<div id="potree_render_area" style="background-image: url('../build/potree/resources/images/background.jpg');"></div>
		<div id="potree_sidebar_container"> </div>
	</div>
	
	<script>
		window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
		
		viewer.setEDLEnabled(true);
		viewer.setFOV(60);
		viewer.setPointBudget(2_000_000);
		viewer.loadSettingsFromURL();
		
		viewer.setDescription("Autonomous Robot Walkthrough Mode Active.");
		
		viewer.loadGUI(() => {
			viewer.setLanguage('en');
			$("#menu_appearance").next().show();
			$("#menu_tools").next().show();
			$("#menu_clipping").next().show();
			viewer.toggleSidebar();
		});

		Potree.loadPointCloud("./pointclouds/index/metadata.json", "index", e => {
			let scene = viewer.scene;
			let pointcloud = e.pointcloud;
			
			let material = pointcloud.material;
			material.size = 1;
			material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
			material.shape = Potree.PointShape.SQUARE;
			material.activeAttributeName = "rgba";
			
			scene.addPointCloud(pointcloud);
			
			// 1. Zoom to fit the entire point cloud perfectly
			viewer.fitToScreen();
			
			// 2. Activate First-Person mode
			viewer.setControls(viewer.fpControls);

			let radius = pointcloud.boundingSphere.radius;
			viewer.getControls().speed = radius * 0.05; 

			// === CREATE A VISIBLE HOLOGRAPHIC HUMANOID (CAMERA-ATTACHED) ===
			let robotGroup = new THREE.Group();
			
			let suitMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, depthTest: false, transparent: true, opacity: 0.9 }); 
			let visorMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, depthTest: false }); 

			// 1. Torso
			let torsoGeo = new THREE.BoxGeometry(0.8, 1.2, 0.4);
			let torso = new THREE.Mesh(torsoGeo, suitMat);
			robotGroup.add(torso);

			// 2. Head (Pivot at neck)
			let headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
			headGeo.translate(0, 0.25, 0);
			let head = new THREE.Mesh(headGeo, suitMat);
			head.position.set(0, 0.6, 0);
			torso.add(head);

			// Visor (Glowing Eyes)
			let visorGeo = new THREE.BoxGeometry(0.4, 0.15, 0.52);
			let visor = new THREE.Mesh(visorGeo, visorMat);
			visor.position.set(0, 0.25, -0.05);
			head.add(visor);

			// 3. Arms (Pivot at shoulders)
			let armGeo = new THREE.BoxGeometry(0.25, 1.0, 0.25);
			armGeo.translate(0, -0.5, 0);
			
			let leftArm = new THREE.Mesh(armGeo, suitMat);
			leftArm.position.set(-0.55, 0.5, 0);
			torso.add(leftArm);

			let rightArm = new THREE.Mesh(armGeo, suitMat);
			rightArm.position.set(0.55, 0.5, 0);
			torso.add(rightArm);

			// 4. Legs (Pivot at hips)
			let legGeo = new THREE.BoxGeometry(0.3, 1.2, 0.3);
			legGeo.translate(0, -0.6, 0);

			let leftLeg = new THREE.Mesh(legGeo, suitMat);
			leftLeg.position.set(-0.25, -0.6, 0);
			torso.add(leftLeg);

			let rightLeg = new THREE.Mesh(legGeo, suitMat);
			rightLeg.position.set(0.25, -0.6, 0);
			torso.add(rightLeg);
			
			// 5. Attach the humanoid DIRECTLY to the camera
			let camera = viewer.scene.getActiveCamera();
			camera.add(robotGroup);
			viewer.scene.scene.add(camera); 
			
			robotGroup.position.set(0, -0.8, -2.5); 
			robotGroup.scale.set(0.3, 0.3, 0.3);
			
			// 6. Walking Animation Loop
			viewer.addEventListener("update", () => {
				let time = performance.now() * 0.005;
				
				leftArm.rotation.x = Math.sin(time) * 0.6;
				rightArm.rotation.x = Math.sin(time + Math.PI) * 0.6;
				leftLeg.rotation.x = Math.sin(time + Math.PI) * 0.6;
				rightLeg.rotation.x = Math.sin(time) * 0.6;
				
				robotGroup.position.y = -0.8 + Math.abs(Math.sin(time)) * 0.05;
			});
			// === END ROBOT DRONE CODE ===
		});
	</script>
</body>
</html>
